name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e .
      - name: Smoke test
        run: |
          python - <<'PYEOF'
          import mltrackr
          with mltrackr.run("ci-test", tags=["ci"]):
              mltrackr.log(accuracy=0.99, loss=0.01)
              mltrackr.note("CI smoke test")
          runs = mltrackr.get_runs()
          assert len(runs) == 1, f"Expected 1 run, got {len(runs)}"
          assert runs[0]["name"] == "ci-test"
          assert "ci" in runs[0]["tags"]
          assert "CI smoke test" in runs[0]["notes"]
          stats = mltrackr.get_stats()
          assert stats["total_runs"] == 1
          print("All assertions passed.")
          PYEOF
